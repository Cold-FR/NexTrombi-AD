security:
    # On déclare notre Provider JIT
    providers:
        app_ldap_provider:
            id: App\Security\LdapJitUserProvider

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Le pare-feu pour la connexion (génère le token)
        login:
            pattern: ^/api/login
            stateless: true
            provider: app_ldap_provider
            custom_authenticators:
                - App\Security\LdapJsonAuthenticator

        # Le pare-feu pour tout le reste de l'API (vérifie le token)
        api:
            pattern: ^/api
            stateless: true
            provider: app_ldap_provider
            jwt: ~ # Active LexikJWT pour lire le token passé dans le header Authorization

    # Contrôle d'accès basique
    access_control:
        # La route de connexion DOIT rester publique
        - { path: ^/api/login, roles: PUBLIC_ACCESS }

        # TOUT le reste de l'API (dont le GET /api/users) nécessite d'être connecté
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
